spring:
  application:
    name: ai-support-ticket
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
  
  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: false
  
  ai:
    dashscope:
      api-key: test-api-key
      chat:
        options:
          model: qwen-max
          temperature: 0.7

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aisupportticket.infrastructure.persistence.po
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: t_

server:
  port: 0

logging:
  level:
    root: WARN
    com.example.aisupportticket: DEBUG
